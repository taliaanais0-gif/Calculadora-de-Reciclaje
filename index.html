<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Reciclaje</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌸 EcoPink - Calculadora de Reciclaje 🌱</h1>

        <label for="plastico">Botellas de plástico:</label>
        <input type="number" id="plastico" min="0" value="0">

        <label for="latas">Latas de aluminio:</label>
        <input type="number" id="latas" min="0" value="0">

        <label for="papel">Papel o cartón:</label>
        <input type="number" id="papel" min="0" value="0">

        <button onclick="calcularImpacto()">
            Calcular
        </button>

        <div id="resultado"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
